name: WebAPI CI

on:
  push:
    branches: [main]
    paths:
      - 'WebAPI/**'
      - '.github/workflows/webapi-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'WebAPI/**'
      - '.github/workflows/webapi-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WebAPI/WebAPI.sln

      - name: Build
        run: dotnet build WebAPI/WebAPI.sln --no-restore -c Release

      - name: Check for vulnerable packages
        run: |
          output=$(dotnet list WebAPI/WebAPI/WebAPI.csproj package --vulnerable --include-transitive)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      - name: Test
        run: dotnet test WebAPI/WebAPI.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/webapi:${{ github.sha }}"
          docker build -f WebAPI/WebAPI/Dockerfile -t "$IMAGE" WebAPI
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ vars.GCP_REGION }} \
            --quiet
