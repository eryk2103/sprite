services:
  webapi:
    image: webapi
    build:
      context: .
      dockerfile: WebAPI/Dockerfile
    ports:
      - "8001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=database,1433;Database=Master;User Id=SA;Password=Pass@word;TrustServerCertificate=True;
    depends_on:
      - database
  database:
    image: mcr.microsoft.com/mssql/server:2017-latest
    environment:
      - SA_PASSWORD=Pass@word
      - ACCEPT_EULA=Y
    ports:
      - "5434:1433"
